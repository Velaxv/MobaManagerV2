# ==============================================================================
# Alembic — Configuração de Migrações de Banco de Dados
# Referência: https://alembic.sqlalchemy.org/en/latest/tutorial.html
# ==============================================================================

[alembic]
# Diretório onde ficam os scripts de migração
script_location = src/migrations

# Formato do nome dos arquivos de revisão gerados
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Codificação do arquivo de migrações
# prepend_sys_path = .

# Tempo limite para aquisição de lock durante migrações (em segundos)
# lock_timeout = 10

# A URL do banco de dados é lida do ambiente via env.py (não definida aqui)
# Isso é necessário para que o env.py possa sobrescrever com SYNC_DATABASE_URL
sqlalchemy.url = driver://user:pass@localhost/dbname

# ==============================================================================
# Logging — Configuração do sistema de logs do Alembic
# ==============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
