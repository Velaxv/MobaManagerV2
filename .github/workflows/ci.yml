# CI — Moba Manager / LoL Manager
# Roda em todo push e PR para main: pytest (backend) + npm build (frontend).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Isolado do DB local; MockRedis (sem serviço Redis)
      DATABASE_URL: sqlite+aiosqlite:///./ci_test.db
      SYNC_DATABASE_URL: sqlite:///./ci_test.db
      REDIS_URL: mock
      PYTHONPATH: .
      ENVIRONMENT: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "fastapi>=0.111" \
            "uvicorn[standard]>=0.30" \
            "sqlalchemy[asyncio]>=2.0" \
            "alembic>=1.13" \
            "aiosqlite>=0.20" \
            "greenlet>=3.0" \
            "redis[hiredis]>=5.0" \
            "pydantic>=2.7" \
            "pydantic-settings>=2.3" \
            "numpy>=1.26" \
            "python-dotenv>=1.0" \
            "apscheduler>=3.10" \
            "pytest>=8.2" \
            "pytest-asyncio>=0.23" \
            "httpx>=0.27"

      - name: Run pytest
        run: python -m pytest tests -q --tb=short

  frontend:
    name: Frontend (npm build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build
